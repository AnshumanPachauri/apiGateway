spring.application.name=api-gateway
server.port=8083
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/spring-boot-microservices-security-realm

#Spring doc configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.urls[0].name=Product Service
springdoc.swagger-ui.urls[0].url=/aggregate/product-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Order Service
springdoc.swagger-ui.urls[1].url=/aggregate/order-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Inventory Service
springdoc.swagger-ui.urls[2].url=/aggregate/inventory-service/v3/api-docs

#Actuator Endpoints configuration
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

#resilience4j Properties
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-type=count-based
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5


# Product
resilience4j.circuitbreaker.instances.product_service_circuit_breaker.base-config=default

# Order
resilience4j.circuitbreaker.instances.order_service_circuit_breaker.base-config=default

# Inventory
resilience4j.circuitbreaker.instances.inventory_service_circuit_breaker.base-config=default

# Swagger
resilience4j.circuitbreaker.instances.product_service_swagger_circuit_breaker.base-config=default
resilience4j.circuitbreaker.instances.order_service_swagger_circuit_breaker.base-config=default
resilience4j.circuitbreaker.instances.inventory_service_swagger_circuit_breaker.base-config=default


#Resilience4j Timeout properties
resilience4j.timelimiter.configs.default.timeout-duration=3s

#Resilience4j retry properties
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=2s